<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculus 2 - Wednesday Notes</title>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-paper: #F9F5EB;
        --text-main: #111827;
        --primary: #2563eb;
        --sol-bg: #eff6ff;
        --font-serif: 'Crimson Pro', serif;
        --font-sans: 'Space Grotesk', sans-serif;
    }

    body {
        background-color: var(--bg-paper);
        color: var(--text-main);
        font-family: var(--font-serif);
        line-height: 1.65;
        margin: 0;
        padding: 40px;
    }

    .page-container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 60px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        min-height: 400px;
    }

    header {
        border-bottom: 2px solid var(--text-main);
        margin-bottom: 40px;
        padding-bottom: 20px;
    }

    h1 {
        font-family: var(--font-sans);
        font-size: 2.5rem;
        margin: 0;
        line-height: 1.2;
    }

    .sub-header {
        font-family: var(--font-sans);
        color: #64748b;
        font-size: 1.1rem;
        margin-top: 10px;
    }

    .note-box {
        background-color: var(--sol-bg);
        border-left: 4px solid var(--primary);
        padding: 20px 30px;
        margin-top: 15px;
        border-radius: 0 6px 6px 0;
        font-size: 1.1rem;
        color: #1e293b;
    }
</style>
</head>

<body>
<div class="page-container">

<header>
    <h1>Wednesday Notes</h1>
    <div class="sub-header">
        Calculus 2 &bull; Classwork Session
    </div>
</header>

<div class="note-box">
    <p><strong>Remark:</strong> No new material was covered in today's class. We spent the session working on classwork problems.</p>
</div>

</div>
</body>
</html>
